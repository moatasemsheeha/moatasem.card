<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moatasem Sheha - Digital Card</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:340px;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}
h1 {
    margin:0;
    font-size:28px;
}
h2 {
    font-size:15px;
    font-weight:normal;
    margin-top:8px;
    color:#555;
}
.btn {
    display:block;
    margin-top:15px;
    padding:14px;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    color:white;
    transition:0.3s ease;
}
.btn:hover {
    transform: translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
.save { background:#34495e; }
.call { background:#27ae60; }
.whatsapp { background:#25D366; }
.linkedin { background:#0077b5; }

.footer {
    margin-top:20px;
    font-size:12px;
    color:#777;
    line-height:1.6;
}
</style>
</head>
<body>
<div class="card">
    <h1>Moatasem Sheha</h1>
    <h2>Chartered Accountant</h2>
    <h2>Chief Financial Officer - Nova HR</h2>
    <h2>Financial Consultant - SAMA College</h2>

    <a class="btn save" href="contact.vcf">💾 Save Contact</a>
    <a class="btn call" href="tel:+201055000221">📞 Call</a>
    <a class="btn whatsapp" href="https://wa.me/201055000221">💬 WhatsApp</a>
    <a class="btn linkedin" href="https://www.linkedin.com/in/moatasem-sheeha">🔗 LinkedIn</a>

    <div class="footer">
        Scan the QR code and save my contact instantly.
    </div>
</div>
</body>
</html>
